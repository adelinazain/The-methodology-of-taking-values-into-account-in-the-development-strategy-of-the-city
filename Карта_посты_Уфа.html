                var html_441df385f137a6e39bc27e2e54e842af = $(`<div id="html_441df385f137a6e39bc27e2e54e842af" style="width: 100.0%; height: 100.0%;">В Уфе хотят снести пятиэтажки за монументом Дружбы и построить высотки  В Уфе планируют снести несколько пятиэтажных домов и общежитие медицинского университета по улице Октябрьской революции, за монументом Дружбы. На их месте планируют построить новые жилые комплексы максимальной высотой до 39–48 этажей. Глава администрации Ратмир Мавлиев утвердил соответствующие проекты планировки и межевания территории. Частные дома по улице Коммунистической и объекты культурного наследия сохранят.   Площадь проектирования составляет 13,9 га и охватывает квартал между проспектом Салавата Юлаева, улицами Коммунистической, Посадской, территорией сквера у монумента Дружбы и улицей Октябрьской революции в Кировском районе столицы. Сейчас на территории расположены: здание Арбитражного суда РБ, пятиэтажные многоквартирные дома, здание общежития Башкирского государственного медицинского университета, частные дома, металлические и капитальные гаражи и шесть объектов культурного наследия по улице Октябрьской революции.  РБК-УФА улица Аксакова</div>`)[0];

                var html_3d8a093b6167e975ec945a3a5f8738f8 = $(`<div id="html_3d8a093b6167e975ec945a3a5f8738f8" style="width: 100.0%; height: 100.0%;">В Уфе улицу Пугачёва достроят в 2025 году.    Реконструкция улицы Пугачёва в рамках проекта «Южные ворота Уфы» будет завершена в 2025 году. Об этом сообщил глава администрации Уфы Ратмир Мавлиев на полях форума «Транспортная неделя».    По его словам, сроки затянулись из-за двух собственников, не пожелавших «мирно расселиться. Но этот вопрос решён, сейчас площадка готовится и в следующем году объект будет завершён».    Приоритетными транспортными проектами уфимский градоначальник назвал ремонт старого Затонского моста, ремонт арочного моста на Южном въезде, строительство новых мостов в створе ул. Интернациональной и моста Дёма — Нижегородка. Сегодня стало известно, что последним проектом займётся дочерняя компания ГК «Ростех» — АО УК «Инфратех концессии».    «Мы должны думать на 20-30 лет вперёд. Уфа активно развивается — высокий миграционный прирост, строится много жилья, становится больше автомобилей. Поэтому вопрос каждого моста для нас архиважен», — сказал мэр    Ратмир Мавлиев напомнил, что в текущем году открылся Восточный выезд — масштабнейший проект последних лет. улица Пугачёва</div>`)[0];
