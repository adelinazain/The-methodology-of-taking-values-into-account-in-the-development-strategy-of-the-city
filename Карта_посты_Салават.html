                var html_d7901d63eda13134c026efa04e2eccaa = $(`<div id="html_d7901d63eda13134c026efa04e2eccaa" style="width: 100.0%; height: 100.0%;">«В час ночи написала подруге, что уже дома»: 26-летняя мать двоих детей из Башкирии погибла в утреннем ДТП   Ранним утром 28 декабря в Стерлитамаке на улице Элеваторной произошло ДТП, в котором погибла молодая женщина. Она была пассажиркой BMW, 30-летний водитель которой не справился с управлением и врезался в столб. Сидевший за рулем иномарки мужчина выжил, но попал в больницу.  В аварии погибла 26-летняя Кристина И. После этой трагедии круглыми сиротами остались две ее дочки 8 и 4 лет.  Сейчас оставшиеся без мамы девочки находятся с Юлией, близкой родственницей Кристины. Она рассказала, что погибшая воспитывала девочек одна последние два года.  «Кристина работала в салоне лазерной эпиляции. Два года назад, в ноябре 2023 года, не стало ее мужа. Дочек ее никто не бросит, нас родственников много, мы поможем», - сказала нам Юлия.  Родственница Кристины признается, что старшей дочке рассказали, что мамы больше нет. Младшая еще совсем маленькая и не осознает случившегося.  «Старшей я постаралась аккуратно рассказать об этом. Она очень плакала. Мы так и не узнали пока, как Кристина оказалась в той машине и кем ей приходился водитель. Она в час ночи написала подруге, что уже дома. Может быть, с корпоратива ехали, мы пока не знаем», - говорит Юлия.  Кристина после потери мужа старалась не унывать и жила ради своих девочек. В свободное от работы время занималась спортом: зимой ее часто можно было встретить на склоне горы со сноубордом, а в летнее время на футбольном поле.  Прощание с Кристиной пройдет 30 декабря в 10:45, в Свято-Никольском кафедральном соборе Стерлитамака (улица Калинина, 52).   Источник: КП улица Калинина, 52</div>`)[0];

                var html_b754c4276de44035fae7bc761dedd930 = $(`<div id="html_b754c4276de44035fae7bc761dedd930" style="width: 100.0%; height: 100.0%;">10 декабря 2023 г.по ул. Красноармейской 10 в 14.30 произошло ДТП. Я выезжала с территории на главную дорогу, через 100 метров мне нужно было повернуть на лево, на прилегающую дорогу, я сделала, всё как нужно, включила поворотник, посмотрела в зеркала заднего вида, трасса была абсолютно пустая, и повернула. Уже на прилегающей дороге я ощутила удар в левое крыло и увидела летящую в поле белую машину. Моя машина остановилась и я вышла, ко мне с поля бежал парень, который сразу же поинтересовался есть ли у меня страховка. Когда я достала тел вызвать ДПС, он уговорил меня, что вызовет сам, потому что быстрее приедут. В силу своей юридической неграмотности я тогда не обратила внимания на многие ньюансы, как оказалось позже.  Приехав, сотрудники ДПС и водитель белой машины-Киа Рио поздоровались за руки, поругали его за такое вождение, сказали, что не могут определить виновника и предложили обоюдку. Я отказалась и дело закрыли. Но спустя 1.5 года с моей банковской карточки начали снимать деньги. Я начала выяснять и оказалось, что мать водителя Киа Риа, она же владелец мащины, подала иск в суд на возмещение ущерба. Я конечно же подала на отмену, мне удовлетворили и назначили пересмотр дела и сказали, что заседание будет закрытым. Я обратилась к юристу. Оказалось, что водитель Киа Рио действующий сотрудник ГИБДД, но оснаваний для проведения закрытого заседания для этого нет, тк он находился не на службе. Изучив дело я увидела ещё много изменённых моментов, тех которые делают меня виновной  в данном ДТП. Водитель Киа Риа вызвал своих сотрудников, которые зафиксировали всё в его пользу, даже не сделали трасологическую экспертизу, тк она бы как раз и показала, что он нёсся на бешеной скорости так, что при торможении стёр всю резину, которую ему в последствии его эксперт заменил на новую вместе с дисками.  На суде мне сказали, что у меня нет доказательст невиновности, но ведь у него их тоже нет! Ни регистраторов, ни очевидцев, нет ничего!!!! Кроме моей, со слов сотрудников Гибдд вины! Получается, если он сотрудник ГАИ, то он прав!? В деле очень много нарушений, которые, как я поняла из первого слушанья во внимание не берут. Я обращаюсь ко всем водителям, понимаю, что прошло много времени, но может кто нибудь проезжал в это время и что то видел? Очень возможно что это подстава, и я не одна такая, откликнитесь! Нужно пытаться остановить этот беспредел! От Елены Андреевой Красноармейская улица</div>`)[0];
